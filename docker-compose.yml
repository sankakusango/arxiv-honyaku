services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: arxiv-honyaku:web
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    volumes:
      - ./arxiv-honyaku.toml:/app/arxiv-honyaku.toml:ro
      - ./prompts:/app/prompts:ro
      - ./runs:/app/runs
      - .:/arxiv-honyaku-dev
